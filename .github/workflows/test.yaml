on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

name: Run Tests

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: '1.26.4'
        cache: false

    - name: Install dependencies
      run: go mod download

    - name: Build binaries
      run: |
        go build -o cli .
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o endpoint ./cmd/endpoint/
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o task ./cmd/task/

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Run tests
      run: gotestsum --junitfile junit.xml -- -coverprofile=coverage.out ./internal/...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
      with:
        files: ./coverage.out
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
      with:
        files: ./junit.xml
        report_type: test_results
        token: ${{ secrets.CODECOV_TOKEN }}
