on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

name: Run Tests

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-go@v6
      with:
        go-version: '1.26.4'
        cache: false

    - name: Install dependencies
      run: go mod download

    - name: Build binaries
      run: |
        go build -o cli .
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o endpoint ./cmd/endpoint/
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o task ./cmd/task/

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Run tests
      run: gotestsum --junitfile junit.xml -- -coverprofile=coverage.out ./internal/...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./coverage.out
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        files: ./junit.xml
        token: ${{ secrets.CODECOV_TOKEN }}
