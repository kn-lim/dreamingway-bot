name: Build and Upload to Lambda

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: '1.26.4'

    - name: Sync Discord commands
      run: go run . --config-string '${{ secrets.DISCORD_CONFIG }}'

    - name: Build endpoint binary for Lambda
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o bootstrap ./cmd/endpoint/
        zip endpoint.zip bootstrap

    - name: Build task binary for Lambda
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o bootstrap ./cmd/task/
        zip task.zip bootstrap

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload endpoint binary to S3 and Lambda
      run: |
        aws s3 cp endpoint.zip \
          s3://${{ secrets.AWS_S3_BUCKET }}/lambda/dreamingway-bot/endpoint/bootstrap.zip
        aws lambda update-function-code \
          --function-name ${{ vars.AWS_LAMBDA_ENDPOINT_FUNCTION_NAME }} \
          --s3-bucket ${{ secrets.AWS_S3_BUCKET }} \
          --s3-key lambda/dreamingway-bot/endpoint/bootstrap.zip

    - name: Upload task binary to S3 and Lambda
      run: |
        aws s3 cp task.zip \
          s3://${{ secrets.AWS_S3_BUCKET }}/lambda/dreamingway-bot/task/bootstrap.zip
        aws lambda update-function-code \
          --function-name ${{ vars.AWS_LAMBDA_TASK_FUNCTION_NAME }} \
          --s3-bucket ${{ secrets.AWS_S3_BUCKET }} \
          --s3-key lambda/dreamingway-bot/task/bootstrap.zip
